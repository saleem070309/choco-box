<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choco Box - شوكولاتة فاخرة ومنتجات منزلية مميزة</title>
    <meta name="description" content="اكتشف عالم الشوكولاتة الفاخرة، الكوكيز، والمعمول في Choco Box. طلبات مخصصة وجودة لا تضاهى.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Choco Box - شوكولاتة فاخرة">
    <meta property="og:description" content="اشهى أنواع الشوكولاتة والحلويات في الرمثا. اطلب الآن!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1548907040-4ba421cf0a53?w=1200">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Fuzzy Search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <!-- Gallery -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <span class="orange">Choco</span> Box
        </div>
        <div class="search-container">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن شوكولاتة، كوكيز...">
        </div>
        <nav>
            <button id="adminBtn" title="لوحة التحكم" onclick="window.location.href='admin.html'"><i class="ph ph-user-gear"></i></button>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>عالم من السعادة في صندوق</h1>
            <p>نقدم لكم أفخر أنواع الشوكولاتة المصنوعة بحب، لتجربة تذوق لا تُنسى في كل قطعة.</p>
            <button class="custom-order-btn" onclick="document.getElementById('productsSection').scrollIntoView({behavior: 'smooth'})">استعرض المنتجات</button>
        </div>
    </section>

    <main>
        <section id="gallerySection">
            <h2>المختارات الفاخرة</h2>
            <div class="swiper">
                <div class="swiper-wrapper" id="swiperWrapper">
                    <!-- Gallery slides will be injected here -->
                </div>
                <div class="swiper-pagination"></div>
                <!-- <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div> -->
            </div>
        </section>

        <section id="productsSection">
            <div class="section-header">
                <h2>قائمة المنتجات</h2>
                <div class="filter-chips">
                    <span class="chip active" onclick="filterByCategory('الكل', this)">الكل</span>
                    <span class="chip" onclick="filterByCategory('شوكولاتة', this)">شوكولاتة</span>
                    <span class="chip" onclick="filterByCategory('كوكيز', this)">كوكيز</span>
                    <span class="chip" onclick="filterByCategory('معمول', this)">معمول</span>
                </div>
            </div>
            <div class="product-grid" id="productGrid">
                <!-- Skeletons will show here initially -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <h3>هل لديك مناسبة خاصة؟</h3>
            <div class="social-links">
                <a href="https://facebook.com" target="_blank" title="فيسبوك"><i class="ph ph-facebook-logo"></i></a>
                <a href="https://instagram.com" target="_blank" title="انستغرام"><i class="ph ph-instagram-logo"></i></a>
                <a href="https://wa.me/962777777777" target="_blank" title="واتساب"><i class="ph ph-whatsapp-logo"></i></a>
            </div>
            <button class="custom-order-btn" onclick="openOrderModal('طلب مخصص')">طلب مخصص</button>
        </div>
        <p style="margin-top: 30px; opacity: 0.7;">© 2026 Choco Box - الرمثا، الأردن</p>
    </footer>

    <!-- Order Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeOrderModal()">&times;</span>
            <h2 id="modalTitle">طلب منتج</h2>
            <form id="orderForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="customerName" required placeholder="أدخل اسمك هنا">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="customerPhone" required placeholder="07XXXXXXXX">
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" id="orderQty" value="1" min="1" required>
                </div>
                <button type="submit" class="submit-btn">إرسال الطلب الآن</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="ph ph-check-circle"></i>
        <span id="toastMessage">تمت العملية بنجاح!</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
